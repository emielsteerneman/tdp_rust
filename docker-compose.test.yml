version: '3.8'

services:
  # MCP Server
  mcp:
    build:
      context: .
      dockerfile: Dockerfile
      target: mcp
    container_name: tdp-mcp-test
    ports:
      - "51001:50001"
      - "51002:50002"
    volumes:
      - ./data/metadata.db:/app/data/metadata.db
      - ./data/activity.db:/app/data/activity.db
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Connect to the existing Qdrant instance on the host
      TDP_DATA_ACCESS__VECTOR__QDRANT__URL: "http://host.docker.internal:6334"
      TDP_DATA_ACCESS__EMBED__OPENAI__API_KEY: ${TDP_OPENAI_API_KEY:-}
    restart: unless-stopped
    depends_on:
      - web

  # REST API Server (Web)
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    container_name: tdp-web-test
    ports:
      - "51000:50000"
    volumes:
      - ./data/metadata.db:/app/data/metadata.db
      - ./data/activity.db:/app/data/activity.db
      - ${TDP_MARKDOWN_ROOT:?Set TDP_MARKDOWN_ROOT in .env}:/data/tdps_markdown:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Connect to the existing Qdrant instance on the host
      TDP_DATA_ACCESS__VECTOR__QDRANT__URL: "http://host.docker.internal:6334"
      TDP_DATA_ACCESS__EMBED__OPENAI__API_KEY: ${TDP_OPENAI_API_KEY:-}
    restart: unless-stopped
